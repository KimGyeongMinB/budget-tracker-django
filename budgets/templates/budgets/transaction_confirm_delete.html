<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거래 기록 삭제 - Smart Budget Tracker</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            background: #f5f7fb;
            color: #1f2937;
            font-family: Arial, sans-serif;
        }

        .card {
            width: min(520px, calc(100% - 32px));
            padding: 28px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        .muted {
            color: #6b7280;
            line-height: 1.6;
        }

        .record {
            margin: 20px 0;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
        }

        .record strong {
            display: block;
            margin-bottom: 6px;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .button {
            display: inline-block;
            padding: 11px 16px;
            border: 0;
            border-radius: 6px;
            background: #b91c1c;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .button.secondary {
            background: #ffffff;
            color: #1f2937;
            border: 1px solid #d1d5db;
        }

        @media (max-width: 560px) {
            .actions {
                flex-direction: column-reverse;
            }

            .button {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>거래 기록 삭제</h1>
        <p class="muted">아래 거래 기록을 삭제하시겠습니까? 삭제한 데이터는 되돌릴 수 없습니다.</p>

        <div class="record">
            <strong>{{ transaction.transaction_date }} · {{ transaction.category.name }}</strong>
            <div>{{ transaction.description|default:"내용 없음" }}</div>
            <div>{{ transaction.get_type_display }} · {{ transaction.amount }}원</div>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <a class="button secondary" href="{% url 'budgets:transaction_list' %}">취소</a>
                <button class="button" type="submit">삭제</button>
            </div>
        </form>
    </main>
</body>
</html>
