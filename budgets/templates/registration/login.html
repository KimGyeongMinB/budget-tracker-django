<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Smart Budget Tracker</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            background: #f5f7fb;
            color: #1f2937;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: min(380px, calc(100% - 32px));
            padding: 28px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 20px;
            font-size: 26px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #4b5563;
            font-size: 14px;
        }

        input {
            width: 100%;
            margin-bottom: 16px;
            padding: 11px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .error {
            margin-bottom: 16px;
            color: #b91c1c;
            font-size: 14px;
        }

        .signup-link {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .signup-link a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="login-box">
        <h1>로그인</h1>

        {% if form.errors %}
            <p class="error">아이디 또는 비밀번호를 다시 확인해주세요.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="{{ form.username.id_for_label }}">아이디</label>
            {{ form.username }}

            <label for="{{ form.password.id_for_label }}">비밀번호</label>
            {{ form.password }}

            <button type="submit">로그인</button>
        </form>

        <div class="signup-link">
            계정이 없으신가요? <a href="{% url 'signup' %}">회원가입</a>
        </div>
    </main>
</body>
</html>
